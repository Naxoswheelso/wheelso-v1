[[headers]]
  for = "/*"
  [headers.values]
    # ---- Content Security Policy ----
    # Pragmatic policy: keeps 'unsafe-inline' for script/style because the site has
    # multiple inline <script> blocks (payment.html, my-booking.html, language toggles,
    # CookieYes footer onclicks) and inline styles. Still provides origin allowlist
    # (blocks externally-loaded malicious scripts), clickjacking protection, data
    # exfiltration protection, and form-action lockdown. Tightening to remove
    # 'unsafe-inline' is tracked as post-launch follow-up.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn-cookieyes.com https://*.cookieyes.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://cdn-cookieyes.com https://wheelso-backend-production.up.railway.app https://*.cookieyes.com https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"

    # ---- Clickjacking & MIME sniffing ----
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

    # ---- Referrer policy ----
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ---- Permissions policy: deny powerful features we don't use ----
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

    # ---- HSTS: force HTTPS for 6 months. NO 'preload' yet — that's reserved for
    # the production cutover on wheelso.gr. Including subdomains is safe because
    # the Netlify test URL is a flat subdomain itself.
    Strict-Transport-Security = "max-age=15552000; includeSubDomains"
