<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
.card {
  width: 1200px; height: 630px;
  background: #093D5E;
  display: flex; flex-direction: column;
  padding: 52px 72px;
}
.top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
}
.brand { display: flex; align-items: center; gap: 16px; }
.brand img { height: 52px; width: auto; }
.brand-name {
  font-size: 28px; font-weight: 700; color: #fff;
  letter-spacing: 2px; text-transform: uppercase;
}
.url { font-size: 22px; color: rgba(255,255,255,0.5); }
.divider { height: 3px; background: #CFDD28; border-radius: 2px; margin-bottom: 44px; }
.headline { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.line1 { font-size: 58px; font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: 10px; }
.line2 { font-size: 68px; font-weight: 800; color: #CFDD28; line-height: 1; letter-spacing: -1px; }
.usps { display: flex; gap: 36px; margin-top: 36px; }
.usp { display: flex; align-items: center; gap: 10px; font-size: 23px; color: rgba(255,255,255,0.72); }
.check { color: #CFDD28; font-size: 24px; font-weight: 800; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="brand">
      <img src="../logo.png" alt="Wheelso">
      <span class="brand-name">Wheelso</span>
    </div>
    <span class="url">wheelso.gr</span>
  </div>
  <div class="divider"></div>
  <div class="headline">
    <div class="line1">Car Rental in</div>
    <div class="line2">Naxos · Paros · Mykonos</div>
  </div>
  <div class="usps">
    <div class="usp"><span class="check">✓</span> No hidden fees</div>
    <div class="usp"><span class="check">✓</span> No credit card</div>
    <div class="usp"><span class="check">✓</span> From €25/day</div>
  </div>
</div>
</body>
</html>
